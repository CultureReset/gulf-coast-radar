<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin Login • Gulf Coast Radar</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .login-container {
      background: white;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      padding: 48px;
      max-width: 440px;
      width: 100%;
    }

    .logo {
      text-align: center;
      margin-bottom: 32px;
    }

    .logo h1 {
      font-size: 28px;
      font-weight: 800;
      color: #667eea;
      margin-bottom: 8px;
    }

    .logo p {
      color: #666;
      font-size: 14px;
    }

    .form-group {
      margin-bottom: 24px;
    }

    .form-label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      color: #333;
      margin-bottom: 8px;
    }

    .form-input {
      width: 100%;
      padding: 14px 16px;
      border: 2px solid #e5e7eb;
      border-radius: 8px;
      font-size: 16px;
      transition: all 0.2s;
    }

    .form-input:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    .btn-login {
      width: 100%;
      padding: 14px 24px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
    }

    .btn-login:active {
      transform: translateY(0);
    }

    .btn-login:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .alert {
      padding: 12px 16px;
      border-radius: 8px;
      margin-bottom: 24px;
      font-size: 14px;
    }

    .alert-error {
      background: #fee;
      color: #c00;
      border: 1px solid #fcc;
    }

    .alert-success {
      background: #efe;
      color: #060;
      border: 1px solid #cfc;
    }

    .alert-info {
      background: #e7f3ff;
      color: #0066cc;
      border: 1px solid #b3d9ff;
    }

    .password-toggle {
      position: relative;
    }

    .password-toggle-btn {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: #666;
      cursor: pointer;
      font-size: 14px;
      padding: 4px 8px;
    }

    .password-toggle-btn:hover {
      color: #667eea;
    }

    .help-text {
      text-align: center;
      margin-top: 24px;
      font-size: 13px;
      color: #666;
    }

    @media (max-width: 480px) {
      .login-container {
        padding: 32px 24px;
      }
    }
  </style>
  <link rel="stylesheet" href="css/header-styles.css">
</head>
<body>
  <div class="gcr-header">
    <div class="site-title">
      <a href="index.html">
        <img src="gcr-logo.png" alt="Gulf Coast Radar Logo" width="70" height="70">GULF COAST RADAR
      </a>
    </div>
  </div>


  <div class="login-container">
    <div class="logo">
      <h1>🔐 Admin Login</h1>
      <p>Gulf Coast Radar Admin Dashboard</p>
    </div>

    <div id="alert-container"></div>

    <form id="login-form">
      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <div class="password-toggle">
          <input
            type="password"
            id="password"
            class="form-input"
            placeholder="Enter admin password"
            required
            autocomplete="current-password"
          >
          <button type="button" class="password-toggle-btn" onclick="togglePassword()">
            👁️ Show
          </button>
        </div>
      </div>

      <button type="submit" class="btn-login" id="login-btn">
        Login to Dashboard
      </button>
    </form>

    <div class="help-text">
      First time? Set your admin password to get started.
    </div>
  </div>

  <script src="js/admin-auth.js"></script>
  <script>
    const auth = new AdminAuth({ requireAuth: false, redirectToLogin: false });
    const form = document.getElementById('login-form');
    const passwordInput = document.getElementById('password');
    const loginBtn = document.getElementById('login-btn');
    const alertContainer = document.getElementById('alert-container');

    // Check if already authenticated
    if (auth.isAuthenticated()) {
      window.location.href = 'admin-dashboard.html';
    }

    // Show info if first time
    if (!auth.isPasswordSet()) {
      showAlert('First time setup: Create your admin password (minimum 6 characters)', 'info');
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const password = passwordInput.value;

      if (password.length < 6) {
        showAlert('Password must be at least 6 characters', 'error');
        return;
      }

      loginBtn.disabled = true;
      loginBtn.textContent = 'Logging in...';

      // Simulate slight delay for better UX
      setTimeout(() => {
        const result = auth.login(password);

        if (result.success) {
          if (result.firstTime) {
            showAlert('Password set successfully! Redirecting...', 'success');
          } else {
            showAlert('Login successful! Redirecting...', 'success');
          }

          setTimeout(() => {
            window.location.href = 'admin-dashboard.html';
          }, 800);
        } else {
          showAlert(result.error || 'Login failed', 'error');
          loginBtn.disabled = false;
          loginBtn.textContent = 'Login to Dashboard';
          passwordInput.value = '';
          passwordInput.focus();
        }
      }, 300);
    });

    function showAlert(message, type = 'info') {
      alertContainer.innerHTML = `
        <div class="alert alert-${type}">
          ${message}
        </div>
      `;
    }

    function togglePassword() {
      const input = document.getElementById('password');
      const btn = document.querySelector('.password-toggle-btn');

      if (input.type === 'password') {
        input.type = 'text';
        btn.textContent = '🙈 Hide';
      } else {
        input.type = 'password';
        btn.textContent = '👁️ Show';
      }
    }

    // Focus password input on load
    passwordInput.focus();
  </script>
</body>
</html>

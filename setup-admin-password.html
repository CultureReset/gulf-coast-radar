<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Setup Admin Password - GCR</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0;
    }
    .container {
      background: white;
      border-radius: 16px;
      padding: 48px;
      max-width: 500px;
      width: 90%;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      text-align: center;
    }
    h1 {
      font-size: 32px;
      margin-bottom: 16px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .status {
      font-size: 64px;
      margin: 24px 0;
    }
    .message {
      font-size: 18px;
      line-height: 1.6;
      color: #4b5563;
      margin-bottom: 24px;
    }
    .btn {
      padding: 16px 32px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      text-decoration: none;
      display: inline-block;
    }
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
    }
    .password-display {
      background: #f3f4f6;
      padding: 16px;
      border-radius: 8px;
      font-family: 'Courier New', monospace;
      font-size: 18px;
      font-weight: 600;
      margin: 16px 0;
      color: #1f2937;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔐 Admin Password Setup</h1>
    <div id="content">
      <div class="status">⏳</div>
      <div class="message">Setting up admin password...</div>
    </div>
  </div>

  <script>
    // Hash password function (same as admin-auth.js)
    function hashPassword(password) {
      let hash = 0;
      for (let i = 0; i < password.length; i++) {
        const char = password.charCodeAt(i);
        hash = ((hash << 5) - hash) + char;
        hash = hash & hash;
      }
      return hash.toString(36);
    }

    // Set the password
    function setupPassword() {
      const password = 'GULFCOASTRADAR$';
      const hashed = hashPassword(password);

      // Store in localStorage
      localStorage.setItem('gcr_admin_auth', hashed);

      // Show success
      document.getElementById('content').innerHTML = `
        <div class="status">✅</div>
        <div class="message">
          <strong>Admin password has been set!</strong><br><br>
          Your password is:
        </div>
        <div class="password-display">GULFCOASTRADAR$</div>
        <div class="message">
          Save this password - you'll need it to log in to the admin dashboard.
        </div>
        <a href="admin-login.html" class="btn">Go to Admin Login →</a>
      `;
    }

    // Run setup on load
    setTimeout(setupPassword, 500);
  </script>
</body>
</html>

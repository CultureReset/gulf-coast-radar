  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0B1220">
  <title>Restaurants — Gulf Coast Radar</title>
  <link rel="stylesheet" href="css/app-styles.css">
  <link rel="stylesheet" href="css/nav.css">
  <link rel="stylesheet" href="css/header-styles.css">
  <link rel="stylesheet" href="css/search.css">
  <link rel="stylesheet" href="css/listing-beachy.css">
  <link rel="stylesheet" href="css/favorites.css">
  <style>
    /* Override dark theme for restaurants page */
    body {
      background: #F3F4F6 !important;
      color: #1F2937 !important;
    }

    .business-card {
      background: #FFFFFF !important;
      border: 1px solid #E5E7EB;
    }

    .business-name {
      color: #1F2937 !important;
    }

    .business-description {
      color: #4B5563 !important;
    }

    .business-info-item {
      color: #6B7280 !important;
    }

    .results-section {
      background: transparent;
    }

    #results-title {
      color: #1F2937 !important;
    }

    .section-header {
      color: #1F2937 !important;
    }
  </style>
  <script src="js/fallback-data.js"></script>
  <script src="js/business-loader.js"></script>
</head>
<body>
  <!-- Back Button -->
  <button class="back-button" onclick="goBack()" id="back-btn">←</button>

  <!-- GCR-Style Header -->
  <div class="gcr-header">
    <div class="site-title">
      <a href="index.html"><img src="gcr-logo.png" alt="Gulf Coast Radar Logo" width="70" height="70">GULF COAST RADAR</a>
    </div>

    <div class="category-tabs">
      <a href="restaurants.html" class="category-tab active">🍽️ Restaurants</a>
      <a href="coffee-sweets.html" class="category-tab">☕ Coffee & Sweets</a>
      <a href="happy-hours.html" class="category-tab">🍻 Happy Hours</a>
      <a href="specials.html" class="category-tab">🎉 Specials</a>
      <a href="events.html" class="category-tab">🎵 Events</a>
      <a href="things-to-do.html" class="category-tab">🎯 Things to Do</a>
      <a href="other.html" class="category-tab">📍 Other</a>
      <a href="feed.html" class="category-tab">📱 Live Feed</a>
    </div>
  </div>

  <!-- Subcategory Filter Tags (dynamically generated) -->
  <section class="cuisine-filter-section">
    <div class="cuisine-filter-scroll">
      <!-- Chips generated dynamically from business data -->
      <button class="cuisine-filter-chip active" data-cuisine="all">All</button>
    </div>
  </section>

  <!-- Results -->
  <section class="results-section">
    <div class="container">
      <div class="section-header">
        <h2 id="results-title">All Restaurants (4)</h2>
        <select id="sort-select" class="sort-select">
          <option value="distance">Sort by Distance</option>
          <option value="name">Sort by Name</option>
          <option value="rating">Sort by Rating</option>
          <option value="price">Sort by Price</option>
        </select>
      </div>

      <div id="restaurants-grid" class="businesses-grid">
        <!-- Restaurants dynamically inserted -->
      </div>
    </div>
  </section>

  <!-- Footer -->
  <footer class="main-footer">
    <div class="container">
      <p>&copy; 2024 Gulf Coast Radar. Orange Beach & Gulf Shores Directory</p>
      <p style="margin-top: 12px;">
        <a href="business-dashboard.html" style="color: rgba(255,255,255,0.7); text-decoration: none; font-size: 13px; transition: color 0.2s; font-weight: 500;">🏪 Business Login</a>
      </p>
    </div>
  </footer>

  <script src="js/sticky-nav-helper.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/business-hours.js"></script>
  <script src="js/distance-service.js"></script>
  <script src="js/favorites-manager.js"></script>
  <script src="js/restaurants.js?v=4"></script>
  <script>
    function goBack() {
      if (window.history.length > 1) {
        window.history.back();
      } else {
        window.location.href = 'index.html';
      }
    }

    // Hamburger Menu Toggle
    function toggleMenu() {
      const hamburger = document.getElementById('hamburger-btn');
      const dropdown = document.getElementById('nav-dropdown');
      hamburger.classList.toggle('active');
      dropdown.classList.toggle('active');
    }

    // Close menu when clicking outside
    document.addEventListener('click', (e) => {
      const hamburger = document.getElementById('hamburger-btn');
      const dropdown = document.getElementById('nav-dropdown');
      if (hamburger && dropdown && !hamburger.contains(e.target) && !dropdown.contains(e.target)) {
        hamburger.classList.remove('active');
        dropdown.classList.remove('active');
      }
    });
  </script>
  <script src="js/category-scroll.js"></script>
  <script src="js/search.js"></script>
  <script src="js/back-button.js"></script>
  <script src="js/ai-config.js"></script>
  <script src="js/ai-backend.js"></script>
  <script src="js/ai-multi-agent.js"></script>
  <script src="js/ai-assistant.js"></script>
  <link rel="stylesheet" href="css/ai-assistant.css">
  <script src="js/tts-voice-manager.js"></script>
  <script src="js/reservation-manager.js"></script>
  <script src="js/calendar-export.js"></script>
  <link rel="stylesheet" href="css/reservation-modal.css">
</body>
</html>
